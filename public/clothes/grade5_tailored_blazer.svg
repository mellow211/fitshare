
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background Studio Surface -->
  <rect width="100%" height="100%" rx="24" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="2" />
  
  <!-- Single Isolated Apparel Product Graphic -->
  <g filter="url(#shadow)">
    
        <!-- Blazer Body -->
        <path d="M 115 110 L 285 110 L 300 330 L 100 330 Z" fill="#1f2937" stroke="#1e293b" stroke-width="4" />
        <!-- Lapels -->
        <path d="M 115 110 L 175 180 L 135 185 L 175 230 L 200 230 L 225 230 L 265 185 L 225 180 L 285 110 Z" fill="#e5e7eb" stroke="#1e293b" stroke-width="3" />
        <!-- Flap Pockets -->
        <rect x="120" y="260" width="60" height="25" fill="#e5e7eb" stroke="#1e293b" stroke-width="2" />
        <rect x="220" y="260" width="60" height="25" fill="#e5e7eb" stroke="#1e293b" stroke-width="2" />
        <!-- Sleeves -->
        <path d="M 115 110 L 50 245 L 85 260 L 120 165 Z" fill="#1f2937" stroke="#1e293b" stroke-width="4" />
        <path d="M 285 110 L 350 245 L 315 260 L 280 165 Z" fill="#1f2937" stroke="#1e293b" stroke-width="4" />
      
  </g>
  
  <!-- Subtle Watermark Tag -->
  <text x="200" y="380" font-family="'Pretendard', sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="1">FITSHARE • 새솔초 [5~6학년용] 정복 스쿨</text>
</svg>
