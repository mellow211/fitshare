
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background Studio Surface -->
  <rect width="100%" height="100%" rx="24" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="2" />
  
  <!-- Single Isolated Apparel Product Graphic -->
  <g filter="url(#shadow)">
    
        <!-- Cardigan Body -->
        <path d="M 120 110 L 280 110 L 295 320 L 105 320 Z" fill="#0f172a" stroke="#1e293b" stroke-width="4" />
        <!-- V-Neck Opening -->
        <path d="M 140 110 L 200 230 L 260 110 Z" fill="#ffffff" stroke="#1e293b" stroke-width="3" />
        <!-- Center Placket & Buttons -->
        <line x1="200" y1="230" x2="200" y2="320" stroke="#1e293b" stroke-width="4" />
        <circle cx="200" cy="245" r="4" fill="#fbbf24" stroke="#1e293b" stroke-width="1.5" />
        <circle cx="200" cy="270" r="4" fill="#fbbf24" stroke="#1e293b" stroke-width="1.5" />
        <circle cx="200" cy="295" r="4" fill="#fbbf24" stroke="#1e293b" stroke-width="1.5" />
        <!-- Long Sleeves -->
        <path d="M 120 110 L 55 235 L 90 250 L 125 160 Z" fill="#0f172a" stroke="#1e293b" stroke-width="4" />
        <path d="M 280 110 L 345 235 L 310 250 L 275 160 Z" fill="#0f172a" stroke="#1e293b" stroke-width="4" />
      
  </g>
  
  <!-- Subtle Watermark Tag -->
  <text x="200" y="380" font-family="'Pretendard', sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="1">FITSHARE • 초등 [3~4학년용] 네이비 V넥</text>
</svg>
