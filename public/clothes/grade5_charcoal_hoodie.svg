
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background Studio Surface -->
  <rect width="100%" height="100%" rx="24" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="2" />
  
  <!-- Single Isolated Apparel Product Graphic -->
  <g filter="url(#shadow)">
    
        <!-- Hoodie body -->
        <path d="M 120 130 Q 200 110 280 130 L 310 330 Q 200 340 90 330 Z" fill="#334155" stroke="#1e293b" stroke-width="4" />
        <!-- Hood -->
        <path d="M 140 120 Q 200 60 260 120 Q 200 135 140 120 Z" fill="#cbd5e1" stroke="#1e293b" stroke-width="4" />
        <!-- Hood strings -->
        <path d="M 185 130 L 180 200" stroke="#f1f5f9" stroke-width="4" stroke-linecap="round" />
        <path d="M 215 130 L 220 200" stroke="#f1f5f9" stroke-width="4" stroke-linecap="round" />
        <!-- Kangaroo Pocket -->
        <path d="M 130 260 L 270 260 L 255 315 L 145 315 Z" fill="#cbd5e1" opacity="0.3" stroke="#1e293b" stroke-width="3" />
        <!-- Sleeves -->
        <path d="M 120 130 L 50 230 L 85 245 L 130 180 Z" fill="#334155" stroke="#1e293b" stroke-width="4" />
        <path d="M 280 130 L 350 230 L 315 245 L 270 180 Z" fill="#334155" stroke="#1e293b" stroke-width="4" />
      
  </g>
  
  <!-- Subtle Watermark Tag -->
  <text x="200" y="380" font-family="'Pretendard', sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="1">FITSHARE • 초등 고학년 [5~6학년용] 차콜</text>
</svg>
