
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background Studio Surface -->
  <rect width="100%" height="100%" rx="24" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="2" />
  
  <!-- Single Isolated Apparel Product Graphic -->
  <g filter="url(#shadow)">
    
        <!-- Long Pants Body -->
        <path d="M 130 90 L 270 90 L 290 350 L 215 350 L 200 170 L 185 350 L 110 350 Z" fill="#78350f" stroke="#1e293b" stroke-width="4" />
        <!-- Waistband -->
        <rect x="130" y="90" width="140" height="30" fill="#fef3c7" stroke="#1e293b" stroke-width="3" />
        <!-- Pockets & Stitches -->
        <path d="M 135 120 Q 160 150 175 120" fill="none" stroke="#1e293b" stroke-width="3" />
        <path d="M 265 120 Q 240 150 225 120" fill="none" stroke="#1e293b" stroke-width="3" />
        <!-- Fly Stitch -->
        <path d="M 200 120 L 200 160 Q 190 170 180 170" fill="none" stroke="#1e293b" stroke-width="2" />
      
  </g>
  
  <!-- Subtle Watermark Tag -->
  <text x="200" y="380" font-family="'Pretendard', sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="1">FITSHARE • 초등 고학년 [5~6학년용] 다크</text>
</svg>
