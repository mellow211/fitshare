
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background Studio Surface -->
  <rect width="100%" height="100%" rx="24" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="2" />
  
  <!-- Single Isolated Apparel Product Graphic -->
  <g filter="url(#shadow)">
    
        <!-- Polo Body -->
        <path d="M 120 120 L 280 120 L 295 330 L 105 330 Z" fill="#ffffff" stroke="#1e293b" stroke-width="4" />
        <!-- Collar -->
        <path d="M 120 120 L 200 155 L 280 120 L 240 100 L 200 115 L 160 100 Z" fill="#0284c7" stroke="#1e293b" stroke-width="4" />
        <!-- Placket & Buttons -->
        <rect x="188" y="150" width="24" height="60" fill="#0284c7" stroke="#1e293b" stroke-width="2" />
        <circle cx="200" cy="165" r="3" fill="#1e293b" />
        <circle cx="200" cy="190" r="3" fill="#1e293b" />
        <!-- Short Sleeves -->
        <path d="M 120 120 L 60 170 L 85 200 L 125 160 Z" fill="#ffffff" stroke="#1e293b" stroke-width="4" />
        <path d="M 280 120 L 340 170 L 315 200 L 275 160 Z" fill="#ffffff" stroke="#1e293b" stroke-width="4" />
      
  </g>
  
  <!-- Subtle Watermark Tag -->
  <text x="200" y="380" font-family="'Pretendard', sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="1">FITSHARE • 새솔초 [5~6학년용] 하복 쿨메</text>
</svg>
