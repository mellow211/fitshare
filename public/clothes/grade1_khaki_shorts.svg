
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background Studio Surface -->
  <rect width="100%" height="100%" rx="24" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="2" />
  
  <!-- Single Isolated Apparel Product Graphic -->
  <g filter="url(#shadow)">
    
        <!-- Shorts Body -->
        <path d="M 125 100 L 275 100 L 295 240 L 210 240 L 200 160 L 190 240 L 105 240 Z" fill="#65a30d" stroke="#1e293b" stroke-width="4" />
        <!-- Elastic Waistband -->
        <rect x="125" y="100" width="150" height="30" fill="#ecfccb" stroke="#1e293b" stroke-width="3" />
        <!-- Drawstring -->
        <path d="M 195 130 L 190 160 M 205 130 L 210 160" stroke="#1e293b" stroke-width="3" stroke-linecap="round" />
        <!-- Side Stripe -->
        <line x1="130" y1="130" x2="110" y2="240" stroke="#ecfccb" stroke-width="6" />
        <line x1="270" y1="130" x2="290" y2="240" stroke="#ecfccb" stroke-width="6" />
      
  </g>
  
  <!-- Subtle Watermark Tag -->
  <text x="200" y="380" font-family="'Pretendard', sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="1">FITSHARE • 키즈 [1~2학년용] 카키 밴딩 </text>
</svg>
