
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.15" />
    </filter>
  </defs>
  <!-- Background Studio Surface -->
  <rect width="100%" height="100%" rx="24" fill="url(#bgGrad)" stroke="#e2e8f0" stroke-width="2" />
  
  <!-- Single Isolated Apparel Product Graphic -->
  <g filter="url(#shadow)">
    
        <!-- Sweatshirt Body -->
        <path d="M 120 115 Q 200 105 280 115 L 295 320 Q 200 330 105 320 Z" fill="#fb7185" stroke="#1e293b" stroke-width="4" />
        <!-- V-notch Crewneck -->
        <path d="M 160 115 Q 200 140 240 115 Z" fill="#ffffff" stroke="#1e293b" stroke-width="3" />
        <path d="M 190 135 L 200 150 L 210 135 Z" fill="#fff1f2" stroke="#1e293b" stroke-width="2" />
        <!-- Long Sleeves -->
        <path d="M 120 115 L 50 240 L 85 255 L 125 170 Z" fill="#fb7185" stroke="#1e293b" stroke-width="4" />
        <path d="M 280 115 L 350 240 L 315 255 L 275 170 Z" fill="#fb7185" stroke="#1e293b" stroke-width="4" />
      
  </g>
  
  <!-- Subtle Watermark Tag -->
  <text x="200" y="380" font-family="'Pretendard', sans-serif" font-size="12" font-weight="700" fill="#94a3b8" text-anchor="middle" letter-spacing="1">FITSHARE • 초등 고학년 [5~6학년용] 코랄</text>
</svg>
